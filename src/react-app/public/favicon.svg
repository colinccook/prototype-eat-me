<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="blobby" x="-10%" y="-10%" width="120%" height="120%">
      <feMorphology operator="dilate" radius="0.5" in="SourceGraphic" result="dilated"/>
      <feGaussianBlur in="dilated" stdDeviation="0.8" result="blurred"/>
      <feComponentTransfer in="blurred" result="blobbed">
        <feFuncA type="discrete" tableValues="0 1 1 1 1 1"/>
      </feComponentTransfer>
      <feGaussianBlur in="blobbed" stdDeviation="0.3" result="smooth"/>
      <feComponentTransfer in="smooth">
        <feFuncA type="discrete" tableValues="0 0 1 1 1 1"/>
      </feComponentTransfer>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComponentTransfer in="blur" result="dimglow">
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="dimglow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="48" height="48" fill="white"/>
  <g filter="url(#glow)">
    <g filter="url(#blobby)">
      <text x="24" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="16" fill="#863bff" letter-spacing="-0.5">eat</text>
      <text x="24" y="37" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="22" fill="#863bff" letter-spacing="-0.5">me</text>
    </g>
  </g>
</svg>
